{% extends "admin/admin_base.html" %}

{% block content %}
<div class="page-header">
  <div>
    <h1 class="page-title">{% if category %}Edit Category{% else %}Add Category{% endif %}</h1>
  </div>
</div>

<div class="admin-form-card">
  <form method="POST" style="display: flex; flex-direction: column; gap: 0;">
    <div class="form-group">
      <label class="form-label" for="name">Name *</label>
      <input class="form-input" type="text" id="name" name="name" required value="{{ category.name if category else '' }}">
    </div>
    <div class="form-group">
      <label class="form-label" for="slug">Slug (auto-generated if blank)</label>
      <input class="form-input" type="text" id="slug" name="slug" value="{{ category.slug or '' if category else '' }}">
    </div>
    <div class="form-group">
      <label class="form-label" for="description">Description</label>
      <textarea class="form-input" id="description" name="description" rows="3" style="resize: vertical; border: 1px solid rgba(201,168,76,0.15); padding: 0.6rem;">{{ category.description or '' if category else '' }}</textarea>
    </div>
    <div class="form-group">
      <label class="form-label" for="parent_id">Parent Category</label>
      <select class="form-select" id="parent_id" name="parent_id">
        <option value="">— None (top level) —</option>
        {% for cat in categories %}
          {% if not category or cat.id != category.id %}
          <option value="{{ cat.id }}" {% if category and category.parent_id == cat.id %}selected{% endif %}>{{ cat.name }}</option>
          {% endif %}
        {% endfor %}
      </select>
    </div>
    <div class="form-group">
      <label class="form-checkbox">
        <input type="checkbox" name="is_featured" value="yes" {% if category and category.is_featured %}checked{% endif %}>
        Featured Category (shown as section on collection page)
      </label>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn-admin-primary">Save</button>
      <a href="{{ url_for('admin.manage_categories') }}" class="btn-admin-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
