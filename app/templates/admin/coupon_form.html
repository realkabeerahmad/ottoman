{% extends "admin/admin_base.html" %}

{% block content %}
<div class="page-header">
  <div>
    <h1 class="page-title">{% if coupon %}Edit Coupon{% else %}Add Coupon{% endif %}</h1>
  </div>
</div>

<div class="admin-form-card">
  <form method="POST" style="display: flex; flex-direction: column; gap: 0;">
    <div class="form-group">
      <label class="form-label" for="code">Coupon Code *</label>
      <input class="form-input" type="text" id="code" name="code" required style="text-transform: uppercase;" value="{{ coupon.code if coupon else '' }}">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label" for="discount_type">Discount Type</label>
        <select class="form-select" id="discount_type" name="discount_type">
          <option value="percentage" {% if coupon and coupon.discount_type == 'percentage' %}selected{% endif %}>Percentage (%)</option>
          <option value="fixed" {% if coupon and coupon.discount_type == 'fixed' %}selected{% endif %}>Fixed Amount</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label" for="discount_value">Discount Value *</label>
        <input class="form-input" type="number" step="0.01" id="discount_value" name="discount_value" required value="{{ coupon.discount_value if coupon else '' }}">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label" for="usage_limit">Usage Limit (leave blank for unlimited)</label>
      <input class="form-input" type="number" id="usage_limit" name="usage_limit" value="{{ coupon.usage_limit if coupon and coupon.usage_limit else '' }}">
    </div>
    {% if coupon %}
    <div class="form-group" style="display: flex; align-items: center; gap: 0.5rem; margin-top: 1rem;">
      <input type="checkbox" id="is_active" name="is_active" {% if coupon.is_active %}checked{% endif %} style="width: 1.2rem; height: 1.2rem;">
      <label class="form-label" for="is_active" style="margin: 0;">Is Active</label>
    </div>
    {% endif %}
    <div class="form-actions">
      <button type="submit" class="btn-admin-primary">{% if coupon %}Update{% else %}Create{% endif %} Coupon</button>
      <a href="{{ url_for('admin.manage_coupons') }}" class="btn-admin-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
