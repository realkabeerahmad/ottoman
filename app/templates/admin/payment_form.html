{% extends "admin/admin_base.html" %}

{% block content %}
<div class="page-header">
  <div>
    <h1 class="page-title">{% if method %}Edit Payment Method{% else %}Add Payment Method{% endif %}</h1>
  </div>
</div>

<div class="admin-form-card">
  <form method="POST" style="display: flex; flex-direction: column; gap: 0;">
    <div class="form-group">
      <label class="form-label" for="name">Name *</label>
      <input class="form-input" type="text" id="name" name="name" required placeholder="e.g. Cash on Delivery" value="{{ method.name if method else '' }}">
    </div>
    <div class="form-group">
      <label class="form-label" for="instructions">Instructions for Customer</label>
      <textarea class="form-input" id="instructions" name="instructions" rows="3" style="resize: vertical; border: 1px solid rgba(201,168,76,0.15); padding: 0.6rem;" placeholder="e.g. Please keep exact change ready at the time of delivery.">{{ method.instructions if method and method.instructions else '' }}</textarea>
    </div>
    {% if method %}
    <div class="form-group" style="display: flex; align-items: center; gap: 0.5rem; margin-top: 1rem;">
      <input type="checkbox" id="is_active" name="is_active" {% if method.is_active %}checked{% endif %} style="width: 1.2rem; height: 1.2rem;">
      <label class="form-label" for="is_active" style="margin: 0;">Is Active</label>
    </div>
    {% endif %}
    <div class="form-actions">
      <button type="submit" class="btn-admin-primary">Save</button>
      <a href="{{ url_for('admin.manage_payment_methods') }}" class="btn-admin-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
