{% extends "admin/admin_base.html" %}

{% block content %}
<div class="page-header">
  <div>
    <h1 class="page-title">{% if method %}Edit Shipping Method{% else %}Add Shipping Method{% endif %}</h1>
  </div>
</div>

<div class="admin-form-card">
  <form method="POST" style="display: flex; flex-direction: column; gap: 0;">
    <div class="form-group">
      <label class="form-label" for="name">Name *</label>
      <input class="form-input" type="text" id="name" name="name" required placeholder="e.g. Standard Delivery" value="{{ method.name if method else '' }}">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label" for="cost">Cost ({{ config.CURRENCY_SYMBOL }}) *</label>
        <input class="form-input" type="number" step="0.01" id="cost" name="cost" required value="{{ method.cost if method else '0' }}">
      </div>
      <div class="form-group">
        <label class="form-label" for="delivery_estimate">Delivery Estimate</label>
        <input class="form-input" type="text" id="delivery_estimate" name="delivery_estimate" placeholder="e.g. 3-5 business days" value="{{ method.delivery_estimate if method and method.delivery_estimate else '' }}">
      </div>
    </div>
    {% if method %}
    <div class="form-group" style="display: flex; align-items: center; gap: 0.5rem; margin-top: 1rem;">
      <input type="checkbox" id="is_active" name="is_active" {% if method.is_active %}checked{% endif %} style="width: 1.2rem; height: 1.2rem;">
      <label class="form-label" for="is_active" style="margin: 0;">Is Active</label>
    </div>
    {% endif %}
    <div class="form-actions">
      <button type="submit" class="btn-admin-primary">Save</button>
      <a href="{{ url_for('admin.manage_shipping') }}" class="btn-admin-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
