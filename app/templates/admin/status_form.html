{% extends "admin/admin_base.html" %}

{% block content %}
<div class="page-header">
  <div>
    <h1 class="page-title">{% if status %}Edit Order Status{% else %}Add Order Status{% endif %}</h1>
  </div>
</div>

<div class="admin-form-card">
  <form method="POST" style="display: flex; flex-direction: column; gap: 0;">
    <div class="form-group">
      <label class="form-label" for="name">Status Name *</label>
      <input class="form-input" type="text" id="name" name="name" required placeholder="e.g. Shipped" value="{{ status.name if status else '' }}" {% if status and status.is_system %}readonly style="opacity: 0.7; cursor: not-allowed;"{% endif %}>
      {% if status and status.is_system %}<div class="form-text" style="color: var(--text-dim); font-size: 0.8rem; margin-top: 0.25rem;">System status names cannot be changed.</div>{% endif %}
    </div>
    <div class="form-group">
      <label class="form-label" for="description">Description</label>
      <textarea class="form-input" id="description" name="description" rows="3" style="resize: vertical; border: 1px solid rgba(201,168,76,0.15); padding: 0.6rem;" placeholder="e.g. Order has been dispatched and is in transit.">{{ status.description if status and status.description else '' }}</textarea>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn-admin-primary">Save</button>
      <a href="{{ url_for('admin.manage_order_statuses') }}" class="btn-admin-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
